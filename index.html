<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Aires Edificio C</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ===== CONTENEDOR GENERAL ===== */
.wrapper {
  width: 100%;
  max-width: 360px;
  padding: 20px;
}

/* ===== TARJETA CONTROL (VISIBLE POR DEFECTO) ===== */
.control {
  background: #020617;
  padding: 30px;
  border-radius: 24px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  
  /* Eliminamos la opacidad 0 y el transform inicial */
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
  transition: all 0.35s ease;
}

h2 {
  text-align: center;
  font-weight: 500;
  margin-bottom: 25px;
}

.fila {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== SWITCH iOS ===== */
.switch {
  position: relative;
  width: 64px;
  height: 34px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  inset: 0;
  background: #475569;
  border-radius: 34px;
  transition: 0.3s;
  cursor: pointer;
}

.slider::before {
  content: "";
  position: absolute;
  height: 28px;
  width: 28px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #22c55e;
}

input:checked + .slider::before {
  transform: translateX(30px);
}

/* Ajuste para que no se vea "apagado" al estar deshabilitado temporalmente */
.switch input:disabled + .slider {
  opacity: 0.7;
  cursor: wait;
}

/* Eliminamos la animación de búsqueda por ahora */
#busqueda {
  display: none;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="busqueda" id="busqueda"></div>

  <div class="control" id="control">
    <h2>Aula C1</h2>

    <div class="fila">
      <span>Aire acondicionado</span>
      <label class="switch">
        <input type="checkbox" id="switchAire">
        <span class="slider"></span>
      </label>
    </div>
  </div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
/* ===== MQTT TOPICS ===== */
const topicCmd    = "aula/C1/aire/cmd";   
const topicEstado = "aula/C1/aire/state"; 

/* ===== ELEMENTOS ===== */
const control    = document.getElementById("control");
const switchAire = document.getElementById("switchAire");

/* ===== CLIENTE MQTT ===== */
const client = mqtt.connect(
  "wss://broker.hivemq.com:8884/mqtt",
  {
    clientId: "web_test_" + Math.random().toString(16).slice(2),
    clean: true,
    reconnectPeriod: 2000
  }
);

/* ===== CONEXIÓN ===== */
client.on("connect", () => {
  console.log("MQTT Conectado");
  client.subscribe(topicEstado);
});

/* ===== MENSAJES MQTT (FEEDBACK) ===== */
client.on("message", (topic, message) => {
  const estado = message.toString().toUpperCase();

  // Actualizamos el switch según lo que diga el ESP32
  if (estado === "ON" || estado === "OFF") {
    switchAire.checked = (estado === "ON");
    switchAire.disabled = false; // Liberamos el control
  }
});

/* ===== USUARIO CAMBIA SWITCH ===== */
switchAire.addEventListener("change", () => {
  // Bloqueo momentáneo para evitar spam de ráfagas IR
  switchAire.disabled = true;

  const comando = switchAire.checked ? "ON" : "OFF";
  console.log("Enviando comando IR:", comando);

  client.publish(
    topicCmd,
    comando,
    { qos: 1 }
  );

  // Timeout de seguridad: si el ESP32 no confirma en 4s, liberamos el switch
  setTimeout(() => {
    if (switchAire.disabled) {
      switchAire.disabled = false;
      console.warn("El dispositivo no confirmó el estado, liberando control.");
    }
  }, 4000);
});
</script>

</body>
</html>
