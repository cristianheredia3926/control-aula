<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Aire Aula C1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.control {
  background: #020617;
  padding: 30px;
  border-radius: 24px;
  width: 100%;
  max-width: 360px;
}
.fila {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.switch {
  position: relative;
  width: 64px;
  height: 34px;
}
.switch input {
  opacity: 0;
}
.slider {
  position: absolute;
  inset: 0;
  background: #475569;
  border-radius: 34px;
  transition: 0.3s;
}
.slider::before {
  content: "";
  position: absolute;
  height: 28px;
  width: 28px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}
input:checked + .slider {
  background: #22c55e;
}
input:checked + .slider::before {
  transform: translateX(30px);
}
.switch input:disabled + .slider {
  opacity: 0.4;
}
</style>
</head>

<body>
<div class="control">
  <h2 style="text-align:center;">Aula C1</h2>
  <div class="fila">
    <span>Aire acondicionado</span>
    <label class="switch">
      <input type="checkbox" id="switchAire" disabled>
      <span class="slider"></span>
    </label>
  </div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

const switchAire = document.getElementById("switchAire");

const topicCmd = "aula/C1/cmd";
const topicEstado = "aula/C1/estado";
const topicOnline = "aula/C1/online";

let online = false;
let sincronizado = false;
let actualizando = false;

client.on("connect", () => {
  client.subscribe([topicEstado, topicOnline]);
});

client.on("message", (topic, message) => {
  const msg = message.toString();
  actualizando = true;

  if (topic === topicOnline) {
    online = (msg === "1");
    switchAire.disabled = !online;
  }

  if (topic === topicEstado && online) {
    if (msg === "ENCENDIDO") {
      switchAire.checked = true;
      sincronizado = true;
    }
    if (msg === "APAGADO") {
      switchAire.checked = false;
      sincronizado = true;
    }
    switchAire.disabled = false;
  }

  actualizando = false;
});

switchAire.addEventListener("change", () => {
  if (!online || !sincronizado || actualizando) {
    switchAire.checked = !switchAire.checked;
    return;
  }
  client.publish(topicCmd, switchAire.checked ? "ON" : "OFF");
  switchAire.disabled = true;
});
</script>
</body>
</html>
  </script>

</body>
</html>
