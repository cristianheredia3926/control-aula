<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control Aula C1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    #estado {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: gray;
      margin: 10px auto;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <h2>Control de Aire - Aula C1</h2>

  <div id="estado"></div>
  <p id="textoEstado">Estado desconocido</p>

  <button id="btnOn" onclick="encender()">Encender</button>
  <button id="btnOff" onclick="apagar()">Apagar</button>

  <!-- Librería MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- JavaScript -->
  <script>
    // Conexión al broker MQTT (WebSocket)
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

    // Elementos HTML
    const estadoDiv = document.getElementById("estado");
    const textoEstado = document.getElementById("textoEstado");
    const btnOn = document.getElementById("btnOn");
    const btnOff = document.getElementById("btnOff");

    // Topics
    const topicCmd = "aula/C1/cmd";
    const topicEstado = "aula/C1/estado";

    // Al conectar al broker
    client.on("connect", () => {
      console.log("Conectado a MQTT");
      client.subscribe(topicEstado);
    });

    // Al recibir mensajes
    client.on("message", (topic, message) => {
      const estado = message.toString();

      if (estado === "ENCENDIDO") {
        estadoDiv.style.background = "green";
        textoEstado.innerText = "Aire ENCENDIDO";
        btnOn.disabled = true;
        btnOff.disabled = false;
      }

      if (estado === "APAGADO") {
        estadoDiv.style.background = "red";
        textoEstado.innerText = "Aire APAGADO";
        btnOn.disabled = false;
        btnOff.disabled = true;
      }
    });

    // Funciones de botones
    function encender() {
      client.publish(topicCmd, "ON");
    }

    function apagar() {
      client.publish(topicCmd, "OFF");
    }
  </script>

</body>
</html>
