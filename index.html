<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Aires</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .wrapper {
    width: 100%;
    max-width: 380px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 30px; /* Espacio entre la sección del aire 1 y el aire 2 */
  }

  /* ===== ESTADOS DE BÚSQUEDA ===== */
  .busqueda {
    text-align: center;
    padding: 20px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 24px;
    border: 1px dashed rgba(255, 255, 255, 0.1);
  }

  .spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border-left-color: #22c55e;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ===== TARJETAS ===== */
  .tarjeta {
    background: #020617;
    padding: 25px 30px;
    border-radius: 24px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    display: none; /* Oculto hasta que el ESP32 se reporte ONLINE */
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2 { 
    text-align: center; 
    font-weight: 500; 
    margin: 0 0 20px 0; 
    font-size: 1.2rem;
    color: #cbd5e1;
  }
  
  .fila { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
  }

  /* ===== SWITCH iOS ===== */
  .switch { position: relative; width: 64px; height: 34px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #475569;
    border-radius: 34px; transition: 0.3s; cursor: pointer;
  }
  .slider::before {
    content: ""; position: absolute; height: 28px; width: 28px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .slider { background: #22c55e; }
  input:checked + .slider::before { transform: translateX(30px); }
  .switch input:disabled + .slider { opacity: 0.7; cursor: wait; }
</style>
</head>

<body>

<div class="wrapper">
  
  <div id="seccionAire1">
    <div id="busqueda1" class="busqueda">
      <div class="spinner"></div>
      <p style="margin: 0; color: #94a3b8;">Buscando Aire...</p>
    </div>

    <div id="tarjeta1" class="tarjeta">
      <h2>Aire Kuka</h2>
      <div class="fila">
        <span>Estado</span>
        <label class="switch">
          <input type="checkbox" id="switchAire1" disabled>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div id="seccionAire2">
    <div id="busqueda2" class="busqueda">
      <div class="spinner"></div>
      <p style="margin: 0; color: #94a3b8;">Buscando Aire...</p>
    </div>

    <div id="tarjeta2" class="tarjeta">
      <h2>Aire C6</h2>
      <div class="fila">
        <span>Estado</span>
        <label class="switch">
          <input type="checkbox" id="switchAire2" disabled>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
/* ===== CONFIGURACIÓN DE TOPICS ===== */
// Aire 1
const topicCmd1      = "aula/C1/aire1/cmd";  
const topicEstado1   = "aula/C1/aire1/state"; 
const topicDisponib1 = "aula/C1/aire1/status"; 

// Aire 2
const topicCmd2      = "aula/C1/aire2/cmd";  
const topicEstado2   = "aula/C1/aire2/state"; 
const topicDisponib2 = "aula/C1/aire2/status"; 

/* ===== ELEMENTOS DEL DOM ===== */
const tarjeta1    = document.getElementById("tarjeta1");
const busqueda1   = document.getElementById("busqueda1");
const switchAire1 = document.getElementById("switchAire1");

const tarjeta2    = document.getElementById("tarjeta2");
const busqueda2   = document.getElementById("busqueda2");
const switchAire2 = document.getElementById("switchAire2");

/* ===== CONEXIÓN MQTT ===== */
// Generamos un ID de cliente único para la web
const clientIDWeb = "web_client_C1_" + Math.random().toString(16).slice(2);

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
  clientId: clientIDWeb,
  reconnectPeriod: 2000 // Intenta reconectar cada 2 segundos si se cae
});

client.on("connect", () => {
  console.log("Web conectada al broker MQTT");
  
  // Nos suscribimos a todos los estados de los dos ESP32
  client.subscribe(topicEstado1);
  client.subscribe(topicDisponib1);
  client.subscribe(topicEstado2);
  client.subscribe(topicDisponib2);
});

/* ===== RECEPCIÓN DE MENSAJES ===== */
client.on("message", (topic, message) => {
  const msg = message.toString().toUpperCase();

  // --- Lógica del AIRE 1 ---
  if (topic === topicDisponib1) {
    if (msg === "ONLINE") {
      busqueda1.style.display = "none";
      tarjeta1.style.display = "block";
      switchAire1.disabled = false;
    } else {
      busqueda1.style.display = "block";
      tarjeta1.style.display = "none";
      switchAire1.disabled = true;
    }
  }
  if (topic === topicEstado1) {
    switchAire1.checked = (msg === "ON");
    switchAire1.disabled = false; // Rehabilitar el switch tras recibir confirmación
  }

  // --- Lógica del AIRE 2 ---
  if (topic === topicDisponib2) {
    if (msg === "ONLINE") {
      busqueda2.style.display = "none";
      tarjeta2.style.display = "block";
      switchAire2.disabled = false;
    } else {
      busqueda2.style.display = "block";
      tarjeta2.style.display = "none";
      switchAire2.disabled = true;
    }
  }
  if (topic === topicEstado2) {
    switchAire2.checked = (msg === "ON");
    switchAire2.disabled = false; // Rehabilitar el switch tras recibir confirmación
  }
});

/* ===== EVENTOS PARA ENVIAR COMANDOS ===== */
function configurarBoton(elementoSwitch, topicComando) {
  elementoSwitch.addEventListener("change", () => {
    // Deshabilitar temporalmente para evitar doble clic rápido
    elementoSwitch.disabled = true;
    
    // Preparar y enviar el comando (ON / OFF)
    const comando = elementoSwitch.checked ? "ON" : "OFF";
    client.publish(topicComando, comando, { qos: 1, retain: false });

    // Si el ESP32 no responde en 5 segundos, rehabilitar el botón por seguridad
    setTimeout(() => {
      if (elementoSwitch.disabled) {
        elementoSwitch.disabled = false;
        console.warn("Tiempo de espera agotado para el comando en: " + topicComando);
      }
    }, 5000);
  });
}

// Aplicamos la función a ambos switches
configurarBoton(switchAire1, topicCmd1);
configurarBoton(switchAire2, topicCmd2);

</script>
</body>
</html>
