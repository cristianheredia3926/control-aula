<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Aires Edificio C</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* ===== CONTENEDOR GENERAL ===== */
.wrapper {
  width: 100%;
  max-width: 360px;
  padding: 20px;
}

/* ===== TEXTO BUSCANDO ===== */
.busqueda {
  text-align: center;
  color: #94a3b8;
  font-size: 15px;
  animation: pulse 1.6s infinite;
}

/* ===== TARJETA CONTROL (OCULTA POR DEFECTO) ===== */
.control {
  background: #020617;
  padding: 30px;
  border-radius: 24px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);

  opacity: 0;
  transform: translateY(20px) scale(0.97);
  pointer-events: none;

  transition: all 0.35s ease;
}

.control.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

h2 {
  text-align: center;
  font-weight: 500;
  margin-bottom: 25px;
}

.fila {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== SWITCH iOS ===== */
.switch {
  position: relative;
  width: 64px;
  height: 34px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  inset: 0;
  background: #475569;
  border-radius: 34px;
  transition: 0.3s;
  cursor: pointer;
}

.slider::before {
  content: "";
  position: absolute;
  height: 28px;
  width: 28px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #22c55e;
}

input:checked + .slider::before {
  transform: translateX(30px);
}

.switch input:disabled + .slider {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ===== ANIMACIÓN BUSCANDO ===== */
@keyframes pulse {
  0% { opacity: .4; }
  50% { opacity: 1; }
  100% { opacity: .4; }
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- Placeholder -->
  <div class="busqueda" id="busqueda">
    Buscando dispositivo…
  </div>

  <!-- Control -->
  <div class="control" id="control">
    <h2>Aula C1</h2>

    <div class="fila">
      <span>Aire acondicionado</span>
      <label class="switch">
        <input type="checkbox" id="switchAire" disabled>
        <span class="slider"></span>
      </label>
    </div>
  </div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
/* ===== MQTT TOPICS ===== */
const topicCmd    = "aula/C1/led/cmd";     // comandos (NO retained)
const topicEstado = "aula/C1/led/state";   // estado (retained)

/* ===== ELEMENTOS ===== */
const control    = document.getElementById("control");
const busqueda   = document.getElementById("busqueda");
const switchAire = document.getElementById("switchAire");

/* ===== ESTADO GLOBAL ===== */
let dispositivoOnline = false;

/* ===== CLIENTE MQTT ===== */
const client = mqtt.connect(
  "wss://broker.hivemq.com:8884/mqtt",
  {
    clientId: "web_" + Math.random().toString(16).slice(2),
    clean: true,
    reconnectPeriod: 2000
  }
);

/* ===== ESTADO INICIAL ===== */
switchAire.disabled = true;

/* ===== CONEXIÓN ===== */
client.on("connect", () => {
  client.subscribe(topicEstado);
});

/* ===== MENSAJES MQTT ===== */
client.on("message", (topic, message) => {
  const estado = message.toString();

  /* OFFLINE DOMINA TODO */
  if (estado === "OFFLINE") {
    dispositivoOnline = false;

    control.classList.remove("visible");
    busqueda.style.display = "block";

    switchAire.disabled = true;
    return; //ignora cualquier mensaje viejo
  }

  /*ON / OFF SOLO SI ESTÁ ONLINE */
  if (estado === "ON" || estado === "OFF") {
    dispositivoOnline = true;

    busqueda.style.display = "none";
    control.classList.add("visible");

    switchAire.checked = (estado === "ON");
    switchAire.disabled = false;
  }
});

/* ===== USUARIO CAMBIA SWITCH ===== */
switchAire.addEventListener("change", () => {
  if (!dispositivoOnline) return;

  switchAire.disabled = true;

  client.publish(
    topicCmd,
    switchAire.checked ? "ON" : "OFF"
  );
});
</script>

</body>
</html>
