<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Aires Edificio C</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .wrapper {
    width: 100%;
    max-width: 360px;
    padding: 20px;
  }

  /* ===== ESTADO BUSCANDO ===== */
  #busqueda {
    text-align: center;
    display: block; /* Visible por defecto */
  }

  .spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border-left-color: #22c55e;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ===== TARJETA CONTROL ===== */
  .control {
    background: #020617;
    padding: 30px;
    border-radius: 24px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    transition: all 0.4s ease;
    
    /* Oculto por defecto hasta detectar ESP32 */
    display: none; 
    opacity: 0;
    transform: translateY(10px);
  }

  .control.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  h2 { text-align: center; font-weight: 500; margin-bottom: 25px; }
  .fila { display: flex; justify-content: space-between; align-items: center; }

  /* ===== SWITCH iOS ===== */
  .switch { position: relative; width: 64px; height: 34px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #475569;
    border-radius: 34px; transition: 0.3s; cursor: pointer;
  }
  .slider::before {
    content: ""; position: absolute; height: 28px; width: 28px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .slider { background: #22c55e; }
  input:checked + .slider::before { transform: translateX(30px); }
  .switch input:disabled + .slider { opacity: 0.7; cursor: wait; }
</style>
</head>

<body>

<div class="wrapper">
  <div id="busqueda">
    <div class="spinner"></div>
    <p>Buscando dispositivo...</p>
  </div>

  <div class="control" id="control">
    <h2>Aula C1</h2>
    <div class="fila">
      <span>Aire acondicionado</span>
      <label class="switch">
        <input type="checkbox" id="switchAire">
        <span class="slider"></span>
      </label>
    </div>
  </div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
/* ===== CONFIGURACIÓN ===== */
const topicCmd      = "aula/C1/aire/cmd";    
const topicEstado   = "aula/C1/aire/state"; 
const topicDisponib = "aula/C1/aire/status"; // Topic para saber si está online

const controlUI = document.getElementById("control");
const busquedaUI = document.getElementById("busqueda");
const switchAire = document.getElementById("switchAire");

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
  clientId: "web_client_" + Math.random().toString(16).slice(2),
  reconnectPeriod: 2000
});

client.on("connect", () => {
  console.log("MQTT Conectado");
  client.subscribe(topicEstado);
  client.subscribe(topicDisponib);
});

client.on("message", (topic, message) => {
  const msg = message.toString().toUpperCase();

  // Lógica de disponibilidad (Online / Offline)
  if (topic === topicDisponib) {
    if (msg === "ONLINE") {
      busquedaUI.style.display = "none";
      controlUI.classList.add("visible");
      controlUI.style.display = "block";
    } else {
      busquedaUI.style.display = "block";
      controlUI.classList.remove("visible");
      controlUI.style.display = "none";
    }
  }

  // Lógica de estado del switch
  if (topic === topicEstado) {
    switchAire.checked = (msg === "ON");
    switchAire.disabled = false;
  }
});

switchAire.addEventListener("change", () => {
  switchAire.disabled = true;
  const comando = switchAire.checked ? "ON" : "OFF";
  client.publish(topicCmd, comando, { qos: 1 });

  setTimeout(() => {
    if (switchAire.disabled) switchAire.disabled = false;
  }, 4000);
});
</script>
</body>
</html>
