<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Aires Edificio C</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .wrapper {
    width: 100%;
    max-width: 360px;
    padding: 20px;
  }

  /* ===== ESTADO BUSCANDO ===== */
  #busqueda {
    text-align: center;
    display: block;
  }

  .spinner {
    border: 4px solid rgba(255, 255, 255, 0.1);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border-left-color: #22c55e;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ===== TARJETA CONTROL ===== */
  .control {
    background: #020617;
    padding: 30px;
    border-radius: 24px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    transition: all 0.4s ease;
    
    display: none; 
    opacity: 0;
    transform: translateY(10px);
  }

  .control.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  h2 { text-align: center; font-weight: 500; margin-bottom: 25px; }
  
  /* Modificado para dar espacio entre los dos aires */
  .fila { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .fila:last-child { margin-bottom: 0; }

  /* ===== SWITCH iOS ===== */
  .switch { position: relative; width: 64px; height: 34px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #475569;
    border-radius: 34px; transition: 0.3s; cursor: pointer;
  }
  .slider::before {
    content: ""; position: absolute; height: 28px; width: 28px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .slider { background: #22c55e; }
  input:checked + .slider::before { transform: translateX(30px); }
  .switch input:disabled + .slider { opacity: 0.7; cursor: wait; }
</style>
</head>

<body>

<div class="wrapper">
  <div id="busqueda">
    <div class="spinner"></div>
    <p>Buscando dispositivo...</p>
  </div>

  <div class="control" id="control">
    <h2>Aula C1</h2>
    
    <div class="fila">
      <span>Aire 1 (Frente)</span>
      <label class="switch">
        <input type="checkbox" id="switchAire1">
        <span class="slider"></span>
      </label>
    </div>

    <div class="fila">
      <span>Aire 2 (Fondo)</span>
      <label class="switch">
        <input type="checkbox" id="switchAire2">
        <span class="slider"></span>
      </label>
    </div>
    
  </div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
/* ===== CONFIGURACIÓN DE TOPICS ===== */
const topicCmd1     = "aula/C1/aire1/cmd";  
const topicEstado1  = "aula/C1/aire1/state"; 

const topicCmd2     = "aula/C1/aire2/cmd";  
const topicEstado2  = "aula/C1/aire2/state"; 

// Un solo topic para saber si el ESP32 está conectado
const topicDisponib = "aula/C1/esp/status"; 

/* ===== ELEMENTOS DEL DOM ===== */
const controlUI = document.getElementById("control");
const busquedaUI = document.getElementById("busqueda");
const switchAire1 = document.getElementById("switchAire1");
const switchAire2 = document.getElementById("switchAire2");

const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
  clientId: "web_client_" + Math.random().toString(16).slice(2),
  reconnectPeriod: 2000
});

client.on("connect", () => {
  console.log("MQTT Conectado");
  client.subscribe(topicEstado1);
  client.subscribe(topicEstado2);
  client.subscribe(topicDisponib);
});

client.on("message", (topic, message) => {
  const msg = message.toString().toUpperCase();

  // Lógica de disponibilidad (Online / Offline)
  if (topic === topicDisponib) {
    if (msg === "ONLINE") {
      busquedaUI.style.display = "none";
      controlUI.classList.add("visible");
    } else {
      busquedaUI.style.display = "block";
      controlUI.classList.remove("visible");
    }
  }

  // Lógica de estado del switch 1
  if (topic === topicEstado1) {
    switchAire1.checked = (msg === "ON");
    switchAire1.disabled = false;
  }

  // Lógica de estado del switch 2
  if (topic === topicEstado2) {
    switchAire2.checked = (msg === "ON");
    switchAire2.disabled = false;
  }
});

/* ===== FUNCIÓN PARA MANEJAR EVENTOS DE LOS SWITCHES ===== */
function configurarSwitch(elementoSwitch, topicComando) {
  elementoSwitch.addEventListener("change", () => {
    elementoSwitch.disabled = true;
    const comando = elementoSwitch.checked ? "ON" : "OFF";
    client.publish(topicComando, comando, { qos: 1 });

    setTimeout(() => {
      if (elementoSwitch.disabled) elementoSwitch.disabled = false;
    }, 4000);
  });
}

// Inicializar eventos
configurarSwitch(switchAire1, topicCmd1);
configurarSwitch(switchAire2, topicCmd2);
</script>
</body>
</html>
