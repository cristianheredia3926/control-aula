<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Aire Aula C1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.control {
  background: #020617;
  padding: 30px;
  border-radius: 24px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

h2 {
  text-align: center;
  font-weight: 500;
  margin-bottom: 25px;
}

.fila {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ===== SWITCH iOS ===== */
.switch {
  position: relative;
  width: 64px;
  height: 34px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  inset: 0;
  background: #475569;
  border-radius: 34px;
  transition: 0.3s;
  cursor: pointer;
}

.slider::before {
  content: "";
  position: absolute;
  height: 28px;
  width: 28px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}

input:checked + .slider {
  background: #22c55e;
}

input:checked + .slider::before {
  transform: translateX(30px);
}

/* Deshabilitado */
.switch input:disabled + .slider {
  opacity: 0.4;
  cursor: not-allowed;
}

.estado {
  margin-top: 15px;
  font-size: 14px;
  text-align: center;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="control">
  <h2>Aula C1</h2>

  <div class="fila">
    <span>Aire acondicionado</span>
    <label class="switch">
      <input type="checkbox" id="switchAire" disabled>
      <span class="slider"></span>
    </label>
  </div>

  <div class="estado" id="estadoTexto">
    Dispositivo desconectado
  </div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
/* ===== MQTT ===== */
const topicCmd    = "aula/C1/led/cmd";     // comandos (NO retained)
const topicEstado = "aula/C1/led/state";   // estado (retained)

const switchAire  = document.getElementById("switchAire");
const estadoTexto = document.getElementById("estadoTexto");

/* ClientID único */
const client = mqtt.connect(
  "wss://broker.hivemq.com:8884/mqtt",
  {
    clientId: "web_" + Math.random().toString(16).slice(2),
    clean: true
  }
);

/* Estado inicial */
switchAire.disabled = true;
estadoTexto.textContent = "Dispositivo desconectado";

/* Conexión */
client.on("connect", () => {
  client.subscribe(topicEstado);
});

/* Mensajes */
client.on("message", (topic, message) => {
  const estado = message.toString();

  if (estado === "ON") {
    switchAire.checked = true;
    switchAire.disabled = false;
    estadoTexto.textContent = "Dispositivo conectado";
  }
  else if (estado === "OFF") {
    switchAire.checked = false;
    switchAire.disabled = false;
    estadoTexto.textContent = "Dispositivo conectado";
  }
  else if (estado === "OFFLINE") {
    switchAire.disabled = true;
    estadoTexto.textContent = "Dispositivo desconectado";
  }
});

/* Usuario cambia switch */
switchAire.addEventListener("change", () => {
  switchAire.disabled = true; // 🔒 hasta confirmación real

  client.publish(
    topicCmd,
    switchAire.checked ? "ON" : "OFF"
  );
});
</script>

</body>
</html>
