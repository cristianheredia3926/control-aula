<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control Aire Aula C1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .control {
      background: #020617;
      padding: 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h2 {
      margin: 0 0 25px;
      text-align: center;
      font-weight: 500;
    }

    .fila {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* SWITCH TIPO iOS */
    .switch {
      position: relative;
      width: 64px;
      height: 34px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #475569;
      border-radius: 34px;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 28px;
      width: 28px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #22c55e;
    }

    input:checked + .slider::before {
      transform: translateX(30px);
    }

    /* Desktop */
    @media (min-width: 600px) {
      .control {
        max-width: 420px;
      }
    }
  </style>
</head>

<body>

  <div class="control">
    <h2>Aula C1</h2>

    <div class="fila">
      <span>Aire acondicionado</span>

      <label class="switch">
        <input type="checkbox" id="switchAire">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <script>
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

    const switchAire = document.getElementById("switchAire");

    const topicCmd = "aula/C1/cmd";
    const topicEstado = "aula/C1/estado";

    let actualizando = false;

    client.on("connect", () => {
      client.subscribe(topicEstado);
    });

    client.on("message", (topic, message) => {
      const estado = message.toString();
      actualizando = true;

      if (estado === "ENCENDIDO") {
        switchAire.checked = true;
      }

      if (estado === "APAGADO") {
        switchAire.checked = false;
      }

      actualizando = false;
    });

    switchAire.addEventListener("change", () => {
      if (actualizando) return;

      const mensaje = switchAire.checked ? "ON" : "OFF";
      client.publish(topicCmd, mensaje);
    });
  </script>

</body>
</html>
